name: Deploy to Hostinger VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies & Build
        run: |
          npm install
          npm run build

      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            # 1. Sync files (using a directory in home first for safety)
            mkdir -p ~/emerald-crm/dist
            
            # Note: We'll use SCP in the next step or just git pull for now
            # For simplicity in this first version, we'll git pull and build ON server
            # because SCPing thousands of files is slow.
            
            cd ~/emerald-crm || git clone https://github.com/moonpeer222-create/Draft-CRM-1-Claw.git ~/emerald-crm
            cd ~/emerald-crm
            git pull origin main
            
            # Setup .env
            echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" > .env
            echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env
            
            # Install & Build
            npm install
            npm run build
            
            # Start or Restart with PM2
            pm2 delete emerald-crm || true
            pm2 start "npx serve -s dist -p 3001" --name emerald-crm
            
            # Save PM2 state
            pm2 save
