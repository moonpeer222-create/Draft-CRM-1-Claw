name: Deploy to Hostinger Shared Hosting (FTP)

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: 🛠️ Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 📦 Install Dependencies
      run: npm install

    - name: 🔍 TypeScript Type Check
      run: npx tsc --noEmit

    - name: 🧹 Lint Code
      run: npm run lint --if-present

    - name: 📦 Build
      run: npm run build
      env:
        VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

    - name: 🚀 Deploy via FTP (lftp)
      run: |
        sudo apt-get update -qq && sudo apt-get install -y -qq lftp > /dev/null
        lftp -u "${{ secrets.FTP_USERNAME }}","${{ secrets.FTP_PASSWORD }}" ${{ secrets.FTP_SERVER }} -e "
          set ssl:verify-certificate no;
          set net:timeout 30;
          set net:max-retries 3;
          lcd ./dist;
          cd .;
          mirror -R --parallel=3 --transfer-all \
            --exclude .logs/ \
            --exclude .filebrowser/ \
            --exclude .ssh/ \
            --exclude .transfer_*/ \
            --exclude domains/ \
            --exclude .git* .;
          bye
        "
