name: Deploy to Hostinger Shared Hosting (FTP)

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: 🛠️ Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: 📦 Install Dependencies
      run: npm install

    - name: 🔍 TypeScript Type Check
      run: npx tsc --noEmit

    - name: 🧹 Lint Code
      run: npm run lint --if-present

    - name: 📦 Build
      run: npm run build
      env:
        VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

    - name: 🗑️ Reset FTP sync state (force full re-upload)
      run: |
        sudo apt-get update -qq && sudo apt-get install -y -qq lftp
        lftp -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_SERVER }} -p 21 -e "
          set ssl:verify-certificate no
          set net:timeout 30
          set net:max-retries 3
          rm -f public_html/.ftp-deploy-sync-state.json
          quit
        "

    - name: 🚀 Sync Files via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        port: 21
        local-dir: ./dist/
        server-dir: ./public_html/
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
