<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Redirecting...</title>
  <script>
    (function() {
      var path = window.location.pathname;
      var search = window.location.search;
      window.location.replace('/#' + path + search);
    })();
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
